services:
  customer-backend:
    build:
      context: ./customer_website_be
      dockerfile: Dockerfile
    container_name: customer-backend
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - store-backend

  store-backend:
    build:
      context: ./store_website_be
      dockerfile: Dockerfile
    container_name: store-backend
    env_file:
      - .env
    ports:
      - "8502:8502"

  customer-frontend:
    build:
      context: ./customer_website_fe
      dockerfile: Dockerfile
    container_name: customer-frontend
    ports:
      - "8503:8503"

  store-frontend:
    build:
      context: ./store_website_fe
      dockerfile: Dockerfile
    container_name: store-frontend
    ports:
      - "8504:8504"

  qcommerce-website:
    build:
      context: ./qcommerce_website
      dockerfile: Dockerfile
    container_name: qcommerce-website
    ports:
      - "8505:8505"
    depends_on:
      - customer-frontend
      - store-frontend
